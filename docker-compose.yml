services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: "3.12"
    image: pick-at-random:latest
    user: "1000:1000"
    env_file:
      - .env
    volumes:
      # Inputs: mounted read-only so the container cannot mutate source CSVs.
      - ./data/in:/data/in:ro
      # Outputs: produced PDFs land on the host filesystem.
      - ./data/out:/data/out:rw
      # PKCS#12 keystore: mounted read-only into /run/secrets. Adjust the
      # left side if your .p12 lives elsewhere on the host.
      - ./secrets:/run/secrets:ro
    # One-shot job; we never want it auto-restarted.
    restart: "no"
    # Provide a CSV path each invocation, e.g.:
    #   docker compose run --rm app /data/in/sample.csv
