services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: "3.12"
    image: pick-at-random:latest
    user: "1000:1000"
    env_file:
      - .env
    environment:
      # Pass the docker-host identity through. Compose substitutes from the
      # operator's shell at parse time. Windows hosts populate COMPUTERNAME
      # and USERNAME; POSIX hosts populate HOSTNAME (often shell-only — set
      # `export HOSTNAME` if blank) and USER. Anything still empty falls back
      # to the .env value, then to None — the PDF row is then omitted.
      HOST_HOSTNAME: "${HOST_HOSTNAME:-${COMPUTERNAME:-${HOSTNAME:-}}}"
      HOST_USERNAME: "${HOST_USERNAME:-${USERNAME:-${USER:-}}}"
    volumes:
      # Inputs: mounted read-only so the container cannot mutate source CSVs.
      - ./data/in:/data/in:ro
      # Outputs: produced PDFs land on the host filesystem.
      - ./data/out:/data/out:rw
      # PKCS#12 keystore: mounted read-only into /run/secrets. Adjust the
      # left side if your .p12 lives elsewhere on the host.
      - ./secrets:/run/secrets:ro
    # One-shot job; we never want it auto-restarted.
    restart: "no"
    # Provide a CSV path each invocation, e.g.:
    #   docker compose run --rm app /data/in/sample.csv
